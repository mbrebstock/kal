<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unser Kalender</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .login-box{background:#1a1d2e;border-radius:16px;padding:48px 40px;width:360px;border:1px solid #2d3148;text-align:center}
  .login-box h1{font-size:1.8rem;color:#a5b4fc;margin-bottom:8px}
  .login-box p{color:#64748b;margin-bottom:32px}
  .login-box input{width:100%;padding:12px 16px;border-radius:8px;border:1px solid #2d3148;background:#13162a;color:#e2e8f0;font-size:1rem;margin-bottom:12px;outline:none;transition:border-color .2s}
  .login-box input:focus{border-color:#6366f1}
  .login-box button{width:100%;padding:12px;border-radius:8px;border:none;background:#6366f1;color:#fff;font-size:1rem;cursor:pointer;font-weight:600;margin-top:4px}
  .login-box button:hover{background:#4f46e5}
  .login-error{color:#f87171;font-size:.875rem;margin-top:8px;min-height:20px}
  #app{display:none;flex-direction:column;height:100vh}
  header{background:#1a1d2e;border-bottom:1px solid #1e2a45;padding:0 16px;display:flex;align-items:center;gap:12px;height:56px;flex-shrink:0;position:sticky;top:0;z-index:100}
  header h1{font-size:1rem;color:#a5b4fc;white-space:nowrap}
  .year-tabs{display:flex;gap:5px;flex:1;overflow-x:auto}
  .year-tab{padding:5px 12px;border-radius:8px;border:none;cursor:pointer;background:#2d3148;color:#8892b0;font-size:.8rem;white-space:nowrap}
  .year-tab.active{background:#6366f1;color:#fff}
  .header-right{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
  .btn-settings,.btn-logout{padding:5px 10px;border-radius:8px;border:none;cursor:pointer;font-size:.8rem}
  .btn-settings{background:#2d3148;color:#94a3b8}
  .btn-logout{background:#1e2235;color:#64748b}
  #tag-filter-bar{background:#13162a;border-bottom:1px solid #1e2a45;padding:6px 16px;display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;align-items:center}
  .filter-tag{padding:3px 12px;border-radius:20px;border:none;cursor:pointer;font-size:.75rem;font-weight:500;opacity:.6}
  .filter-tag.active{opacity:1;box-shadow:0 0 0 2px rgba(255,255,255,.3)}
  #filter-label{color:#475569;font-size:.75rem;margin-right:2px;flex-shrink:0}
  #calendar-container{flex:1;overflow-y:auto}
  table{width:100%;border-collapse:collapse}
  thead th{background:#1a1d2e;padding:7px 10px;text-align:left;font-size:.7rem;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #1e2a45}
  .day-row{border-bottom:1px solid #1a2035}
  .day-row.today .day-date-cell{border-left:3px solid #6366f1}
  .day-row.today .day-date{color:#a5b4fc;font-weight:700}
  .day-row.weekend .day-date{color:#7c8ca8}
  .day-date-cell{padding:7px 10px;vertical-align:top;width:90px}
  .day-date{font-size:.75rem;color:#4a5568;white-space:nowrap}
  .entries-cell{padding:3px 6px;vertical-align:top}
  .entry-item{display:flex;align-items:center;gap:6px;padding:4px 8px;margin:2px 0;border-radius:6px;background:#1e2235;font-size:.82rem;cursor:pointer}
  .entry-item:hover{background:#252840}
  .entry-text{flex:1;color:#cbd5e1;word-break:break-word}
  .entry-delete{opacity:0;font-size:.7rem;color:#ef4444;cursor:pointer;padding:1px 5px;border-radius:4px;border:none;background:transparent;flex-shrink:0}
  .entry-item:hover .entry-delete{opacity:1}
  .entry-tags-inline{display:flex;gap:3px;flex-wrap:wrap;flex-shrink:0}
  .tag-badge{font-size:.65rem;padding:1px 6px;border-radius:10px;font-weight:500;white-space:nowrap}
  .add-cell{padding:3px 6px;vertical-align:top;text-align:center;width:38px}
  .btn-add{width:26px;height:26px;border-radius:50%;border:none;background:#6366f1;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px}
  .btn-add:hover{background:#4f46e5}
  .month-row td{background:#161926;padding:5px 10px;font-size:.7rem;font-weight:700;color:#6366f1;text-transform:uppercase;letter-spacing:.08em;border-top:2px solid #1e2a45;border-bottom:1px solid #1e2a45}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;padding:16px}
  .modal-overlay.open{display:flex}
  .modal{background:#1a1d2e;border-radius:16px;padding:24px;width:100%;max-width:480px;border:1px solid #2d3148;box-shadow:0 25px 60px rgba(0,0,0,.5);max-height:90vh;overflow-y:auto}
  .modal h2{font-size:.95rem;color:#a5b4fc;margin-bottom:18px}
  .modal textarea{width:100%;min-height:90px;padding:10px;border-radius:8px;border:1px solid #2d3148;background:#13162a;color:#e2e8f0;font-size:.9rem;resize:vertical;outline:none;font-family:inherit}
  .modal textarea:focus{border-color:#6366f1}
  .modal-label{font-size:.78rem;color:#64748b;margin:12px 0 6px}
  .modal-tags{display:flex;flex-wrap:wrap;gap:6px}
  .modal-tag-btn{padding:4px 12px;border-radius:20px;border:2px solid transparent;cursor:pointer;font-size:.78rem;font-weight:500;opacity:.5}
  .modal-tag-btn.selected{opacity:1;border-color:rgba(255,255,255,.5)}
  .modal-actions{display:flex;gap:8px;margin-top:18px}
  .btn-cancel{flex:1;padding:9px;border-radius:8px;border:none;background:#2d3148;color:#94a3b8;cursor:pointer;font-size:.88rem}
  .btn-save{flex:1;padding:9px;border-radius:8px;border:none;background:#6366f1;color:#fff;cursor:pointer;font-size:.88rem;font-weight:600}
  .settings-section{margin-bottom:18px}
  .settings-section h3{font-size:.78rem;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
  .tag-manager{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .tag-manager-item{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.78rem}
  .tag-delete-btn{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:.85rem;line-height:1;padding:0 1px}
  .tag-delete-btn:hover{color:#ef4444}
  .new-tag-row{display:flex;gap:6px;margin-top:6px}
  .new-tag-row input{flex:1;padding:7px 10px;border-radius:8px;border:1px solid #2d3148;background:#13162a;color:#e2e8f0;font-size:.85rem;outline:none}
  .new-tag-row input:focus{border-color:#6366f1}
  .color-picker-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .color-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent}
  .color-opt.selected{border-color:#fff}
  .btn-add-tag{padding:7px 14px;border-radius:8px;border:none;background:#6366f1;color:#fff;cursor:pointer;font-size:.82rem;font-weight:600;white-space:nowrap}
  #btn-today{position:fixed;bottom:20px;right:16px;padding:9px 18px;border-radius:24px;border:none;background:#6366f1;color:#fff;cursor:pointer;font-size:.82rem;font-weight:600;box-shadow:0 4px 20px rgba(99,102,241,.4);z-index:50}
  .loading{text-align:center;padding:60px;color:#475569}
  .toast{position:fixed;bottom:70px;right:16px;background:#1e2235;border:1px solid #2d3148;color:#e2e8f0;padding:8px 16px;border-radius:8px;font-size:.82rem;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}
  @media(max-width:480px){
    .day-date-cell{width:70px}
    header h1{font-size:.85rem}
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>&#128197; Unser Kalender</h1>
    <p>Nur f&#252;r uns zwei &#10084;&#65039;</p>
    <input type="email" id="login-email" placeholder="E-Mail" autocomplete="email">
    <input type="password" id="login-password" placeholder="Passwort" autocomplete="current-password">
    <button id="btn-login">Einloggen</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <h1>&#128197; Kalender</h1>
    <div class="year-tabs" id="year-tabs"></div>
    <div class="header-right">
      <button class="btn-settings" id="btn-open-settings">&#9881; Tags</button>
      <button class="btn-logout" id="btn-logout">&#128682;</button>
    </div>
  </header>
  <div id="tag-filter-bar"><span id="filter-label">Filter:</span></div>
  <div id="calendar-container"><div class="loading">Wird geladen&#8230;</div></div>
  <button id="btn-today">Heute</button>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2 id="modal-title">Neuer Eintrag</h2>
    <textarea id="entry-text" placeholder="Was steht an&#8230;" rows="4"></textarea>
    <div class="modal-label">Tags:</div>
    <div class="modal-tags" id="modal-tags"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel-entry">Abbrechen</button>
      <button class="btn-save" id="btn-save-entry">Speichern</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>&#9881;&#65039; Tags verwalten</h2>
    <div class="settings-section">
      <h3>Vorhandene Tags</h3>
      <div class="tag-manager" id="tag-manager-list"></div>
    </div>
    <div class="settings-section">
      <h3>Neuen Tag anlegen</h3>
      <div class="new-tag-row">
        <input type="text" id="new-tag-name" placeholder="Tag-Name" maxlength="30">
        <button class="btn-add-tag" id="btn-do-add-tag">Hinzuf&#252;gen</button>
      </div>
      <div class="modal-label">Farbe:</div>
      <div class="color-picker-row" id="color-picker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-save" id="btn-close-settings">Fertig</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://vbxtdeedozcvhcamhipz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieHRkZWVkb3pjdmhjYW1oaXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTIyNTAsImV4cCI6MjA4ODkyODI1MH0.Ners2V_WXlt2sTh8UtKC6bk7ZcZn2LgfUzbFExpz9ik';
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TAG_COLORS = ['#7c3aed','#2563eb','#0891b2','#059669','#d97706','#dc2626','#db2777','#6d28d9','#0284c7','#65a30d'];
const TAG_BG = {'#7c3aed':'#3b1a6e','#2563eb':'#1e3a7a','#0891b2':'#0e4d66','#059669':'#064e35','#d97706':'#7a4209','#dc2626':'#7a1616','#db2777':'#7a1045','#6d28d9':'#3b1577','#0284c7':'#0a4a7a','#65a30d':'#2d4a06'};
const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const MONTHS_SHORT = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const DAYS = ['So','Mo','Di','Mi','Do','Fr','Sa'];

let currentYear = new Date().getFullYear();
let entries = {};
let tags = [];
let activeFilters = new Set();
let addModalDate = null;
let editingEntryId = null;
let selectedColor = TAG_COLORS[0];
let realtime = null;

// AUTH
document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('login-password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  const { error } = await db.auth.signInWithPassword({ email, password: pw });
  if (error) { err.textContent = 'Fehler: ' + error.message; return; }
  initApp();
}

document.getElementById('btn-logout').addEventListener('click', async () => {
  await db.auth.signOut(); location.reload();
});

db.auth.onAuthStateChange((event, session) => {
  if (session) initApp();
});

async function initApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  await loadTags();
  await loadEntries();
  renderYearTabs();
  renderFilterBar();
  renderCalendar();
  subscribeRealtime();
  setTimeout(scrollToToday, 400);
}

// DATA
async function loadTags() {
  const { data } = await db.from('tags').select('*').order('name');
  tags = data || [];
}

async function loadEntries() {
  const { data } = await db.from('entries').select('*').order('created_at');
  entries = {};
  (data||[]).forEach(e => {
    if (!entries[e.date]) entries[e.date] = [];
    entries[e.date].push(e);
  });
}

function subscribeRealtime() {
  if (realtime) db.removeChannel(realtime);
  realtime = db.channel('changes')
    .on('postgres_changes', {event:'*',schema:'public',table:'entries'}, async () => {
      await loadEntries(); renderCalendar(); showToast('Aktualisiert ✓');
    })
    .on('postgres_changes', {event:'*',schema:'public',table:'tags'}, async () => {
      await loadTags(); renderFilterBar(); renderCalendar();
    })
    .subscribe();
}

// YEAR TABS
function renderYearTabs() {
  const el = document.getElementById('year-tabs');
  const years = [currentYear-1, currentYear, currentYear+1, currentYear+2];
  el.innerHTML = years.map(y =>
    `<button class="year-tab ${y===currentYear?'active':''}" data-year="${y}">${y}</button>`
  ).join('');
  el.querySelectorAll('.year-tab').forEach(b => b.addEventListener('click', () => {
    currentYear = parseInt(b.dataset.year);
    renderYearTabs(); renderCalendar(); setTimeout(scrollToToday, 100);
  }));
}

// FILTER BAR
function renderFilterBar() {
  const bar = document.getElementById('tag-filter-bar');
  let html = '<span id="filter-label">Filter:</span>';
  html += `<button class="filter-tag active" style="background:#6366f1;color:#fff" id="filter-all">Alle</button>`;
  tags.forEach(t => {
    const bg = TAG_BG[t.color]||'#1e2235';
    const act = activeFilters.has(t.id)?'active':'';
    html += `<button class="filter-tag ${act}" style="background:${bg};color:${t.color}" data-tagid="${t.id}">${t.name}</button>`;
  });
  bar.innerHTML = html;
  bar.querySelector('#filter-all').addEventListener('click', () => { activeFilters.clear(); renderFilterBar(); renderCalendar(); });
  bar.querySelectorAll('[data-tagid]').forEach(b => b.addEventListener('click', () => {
    const id = b.dataset.tagid;
    if (activeFilters.has(id)) activeFilters.delete(id); else activeFilters.add(id);
    renderFilterBar(); renderCalendar();
  }));
}

// CALENDAR
function renderCalendar() {
  const container = document.getElementById('calendar-container');
  const todayStr = fmtDate(new Date());
  let html = `<table><colgroup><col style="width:90px"><col><col style="width:38px"></colgroup>
    <thead><tr><th>Datum</th><th>Einträge &amp; Tags</th><th></th></tr></thead><tbody>`;
  let lastMonth = -1;

  for (let m=0; m<12; m++) {
    const dim = new Date(currentYear, m+1, 0).getDate();
    for (let d=1; d<=dim; d++) {
      const date = new Date(currentYear, m, d);
      const ds = fmtDate(date);
      const dow = date.getDay();
      const isToday = ds===todayStr;
      const isWeekend = dow===0||dow===6;
      if (m!==lastMonth) {
        html += `<tr class="month-row" id="month-${currentYear}-${m}"><td colspan="3">${MONTHS[m]} ${currentYear}</td></tr>`;
        lastMonth = m;
      }
      let dayE = entries[ds]||[];
      if (activeFilters.size>0) dayE = dayE.filter(e => e.tags&&e.tags.some(tid=>activeFilters.has(tid)));

      html += `<tr class="day-row ${isToday?'today':''} ${isWeekend?'weekend':''}" id="day-${ds}">
        <td class="day-date-cell"><div class="day-date">${DAYS[dow]}, ${d}.</div></td>
        <td class="entries-cell">`;

      dayE.forEach(e => {
        const eTags = (e.tags||[]).map(tid => {
          const t = tags.find(x=>x.id===tid);
          if (!t) return '';
          return `<span class="tag-badge" style="background:${TAG_BG[t.color]||'#1e2235'};color:${t.color}">${t.name}</span>`;
        }).join('');
        html += `<div class="entry-item" data-eid="${e.id}">
          <span class="entry-text">${escH(e.text)}</span>
          <div class="entry-tags-inline">${eTags}</div>
          <button class="entry-delete" data-did="${e.id}">✕</button>
        </div>`;
      });

      html += `</td><td class="add-cell">
        <button class="btn-add" data-date="${ds}">+</button>
      </td></tr>`;
    }
  }
  html += '</tbody></table>';
  container.innerHTML = html;

  container.querySelectorAll('.btn-add').forEach(b => b.addEventListener('click', () => openAddModal(b.dataset.date)));
  container.querySelectorAll('.entry-item').forEach(el => el.addEventListener('click', (e) => {
    if (!e.target.classList.contains('entry-delete')) editEntry(el.dataset.eid);
  }));
  container.querySelectorAll('.entry-delete').forEach(b => b.addEventListener('click', (e) => {
    e.stopPropagation(); deleteEntry(b.dataset.did);
  }));
}

// ADD/EDIT MODAL
function openAddModal(dateStr) {
  addModalDate = dateStr; editingEntryId = null;
  const [y,m,d] = dateStr.split('-');
  document.getElementById('modal-title').textContent = `Neuer Eintrag – ${parseInt(d)}. ${MONTHS_SHORT[parseInt(m)-1]} ${y}`;
  document.getElementById('entry-text').value = '';
  document.getElementById('btn-save-entry').textContent = 'Speichern';
  renderModalTags([]);
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('entry-text').focus(),100);
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
  addModalDate = null; editingEntryId = null;
}

function renderModalTags(selIds) {
  const el = document.getElementById('modal-tags');
  if (!tags.length) { el.innerHTML='<span style="color:#475569;font-size:.82rem">Noch keine Tags – zuerst anlegen</span>'; return; }
  el.innerHTML = tags.map(t => {
    const bg = TAG_BG[t.color]||'#1e2235';
    const sel = selIds.includes(t.id)?'selected':'';
    return `<button class="modal-tag-btn ${sel}" style="background:${bg};color:${t.color}" data-tagid="${t.id}">${t.name}</button>`;
  }).join('');
  el.querySelectorAll('.modal-tag-btn').forEach(b => b.addEventListener('click',()=>b.classList.toggle('selected')));
}

async function saveEntry() {
  const text = document.getElementById('entry-text').value.trim();
  if (!text) { showToast('Bitte Text eingeben'); return; }
  const selTags = [...document.querySelectorAll('.modal-tag-btn.selected')].map(b=>b.dataset.tagid);
  if (editingEntryId) {
    await db.from('entries').update({text, tags:selTags}).eq('id',editingEntryId);
    showToast('Aktualisiert ✓');
  } else {
    await db.from('entries').insert({date:addModalDate, text, tags:selTags});
    showToast('Gespeichert ✓');
  }
  closeAddModal(); await loadEntries(); renderCalendar();
}

async function deleteEntry(id) {
  if (!confirm('Eintrag löschen?')) return;
  await db.from('entries').delete().eq('id',id);
  await loadEntries(); renderCalendar();
}

async function editEntry(id) {
  let found = null;
  Object.values(entries).forEach(arr=>arr.forEach(e=>{if(e.id===id)found=e;}));
  if (!found) return;
  addModalDate = found.date; editingEntryId = id;
  const [y,m,d] = found.date.split('-');
  document.getElementById('modal-title').textContent = `Bearbeiten – ${parseInt(d)}. ${MONTHS_SHORT[parseInt(m)-1]} ${y}`;
  document.getElementById('entry-text').value = found.text;
  document.getElementById('btn-save-entry').textContent = 'Aktualisieren';
  renderModalTags(found.tags||[]);
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('entry-text').focus(),100);
}

document.getElementById('btn-cancel-entry').addEventListener('click', closeAddModal);
document.getElementById('btn-save-entry').addEventListener('click', saveEntry);

// SETTINGS
document.getElementById('btn-open-settings').addEventListener('click', openSettings);
document.getElementById('btn-close-settings').addEventListener('click', closeSettings);
document.getElementById('btn-do-add-tag').addEventListener('click', addNewTag);

function openSettings() {
  renderSettingsTags(); renderColorPicker();
  document.getElementById('settings-modal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
  renderFilterBar(); renderCalendar();
}

function renderSettingsTags() {
  const el = document.getElementById('tag-manager-list');
  if (!tags.length) { el.innerHTML='<span style="color:#475569;font-size:.82rem">Noch keine Tags</span>'; return; }
  el.innerHTML = tags.map(t => {
    const bg = TAG_BG[t.color]||'#1e2235';
    return `<span class="tag-manager-item" style="background:${bg};color:${t.color}">${t.name}
      <button class="tag-delete-btn" data-tid="${t.id}">&#215;</button></span>`;
  }).join('');
  el.querySelectorAll('.tag-delete-btn').forEach(b=>b.addEventListener('click',()=>deleteTag(b.dataset.tid)));
}

function renderColorPicker() {
  const el = document.getElementById('color-picker');
  el.innerHTML = TAG_COLORS.map(c=>
    `<div class="color-opt ${c===selectedColor?'selected':''}" style="background:${c}" data-color="${c}"></div>`
  ).join('');
  el.querySelectorAll('.color-opt').forEach(d=>d.addEventListener('click',()=>{
    selectedColor=d.dataset.color; renderColorPicker();
  }));
}

async function addNewTag() {
  const name = document.getElementById('new-tag-name').value.trim();
  if (!name) { showToast('Bitte Name eingeben'); return; }
  const { error } = await db.from('tags').insert({name, color:selectedColor});
  if (error) { showToast('Fehler: '+error.message); return; }
  document.getElementById('new-tag-name').value='';
  await loadTags(); renderSettingsTags(); showToast('Tag angelegt ✓');
}

async function deleteTag(id) {
  if (!confirm('Tag löschen?')) return;
  await db.from('tags').delete().eq('id',id);
  const all = Object.values(entries).flat().filter(e=>e.tags&&e.tags.includes(id));
  for (const e of all) await db.from('entries').update({tags:e.tags.filter(t=>t!==id)}).eq('id',e.id);
  await loadTags(); await loadEntries(); renderSettingsTags(); renderFilterBar(); renderCalendar();
}

// HELPERS
document.getElementById('btn-today').addEventListener('click', scrollToToday);

function scrollToToday() {
  const el = document.getElementById('day-'+fmtDate(new Date()));
  if (el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function escH(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){closeAddModal();closeSettings();}
});
</script>
