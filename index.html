<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Kalender</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      --bg:           #0f1117;
      --surface:      #1a1d2e;
      --surface-2:    #1e2235;
      --border:       #2d3148;
      --text:         #e2e8f0;
      --text-muted:   #94a3b8;
      --text-faint:   #475569;
      --accent:       #6366f1;
      --accent-hover: #4f46e5;
      --danger:       #ef4444;
      --success:      #22c55e;
      --overlay:      rgba(3, 6, 18, 0.78);
      --shadow:       0 18px 50px rgba(0, 0, 0, 0.38);
      --radius-sm:    8px;
      --radius-md:    12px;
      --radius-lg:    16px;
      --radius-xl:    20px;
      --radius-full:  999px;
      --header-h:     52px;
      --bottom-h:     52px;
      --date-col:     82px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100dvh;
      overflow: hidden;
      margin: 0;
      background: var(--bg);
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Satoshi', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      font-size: 14px;
      line-height: 1.45;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top right, rgba(99, 102, 241, 0.08), transparent 26%),
        var(--bg);
    }

    img, svg { display: block; max-width: 100%; }
    button, input, textarea, select { font: inherit; color: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    input, textarea, select {
      font-size: 16px;
      min-height: 44px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      outline: none;
      width: 100%;
    }

    textarea { min-height: 96px; resize: vertical; }
    input::placeholder, textarea::placeholder { color: var(--text-faint); }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.16);
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .hidden { display: none !important; }

    .skip-link {
      position: absolute;
      left: 12px;
      top: -60px;
      z-index: 1000;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      transition: top 0.2s ease;
    }

    .skip-link:focus { top: 12px; }

    #root, #modal-root, #toast-root {
      position: relative;
      z-index: 1;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 40;
      height: var(--header-h);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: var(--space-2);
      padding: 0 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 17, 23, 0.96);
      backdrop-filter: blur(12px);
    }

    .header-left, .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .header-center {
      min-width: 0;
      display: flex;
      justify-content: center;
    }

    .brand {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border: 1px solid var(--border);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      color: var(--text);
      padding: 0;
    }

    .brand svg { width: 20px; height: 20px; }

    .view-tabs {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
    }

    .tab-btn,
    .year-btn,
    .filter-btn,
    .icon-btn,
    .btn,
    .tag-pill,
    .color-dot {
      min-width: 44px;
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--text-muted);
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease, transform 0.16s ease, opacity 0.16s ease;
    }

    .tab-btn {
      padding: 0 10px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .tab-btn.is-active,
    .year-btn.is-active {
      color: #ffffff;
      background: linear-gradient(180deg, rgba(99, 102, 241, 0.42), rgba(79, 70, 229, 0.24));
      border-color: rgba(165, 180, 252, 0.8);
      box-shadow: 0 0 0 1px rgba(165, 180, 252, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .filter-btn.is-active,
    .tag-pill.is-active {
      color: #ffffff !important;
      border-color: rgba(255, 255, 255, 0.34) !important;
      box-shadow: 0 0 0 2px rgba(165, 180, 252, 0.65), inset 0 1px 0 rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
      filter: saturate(1.18) brightness(1.12);
    }

    .tab-btn:active,
    .year-btn:active,
    .filter-btn:active,
    .icon-btn:active,
    .btn:active,
    .tag-pill:active,
    .color-dot:active { transform: scale(0.98); }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-color: var(--border);
      background: var(--surface);
      padding: 0;
      flex: 0 0 auto;
    }

    .icon-btn.is-active {
      color: #ffffff;
      border-color: rgba(165, 180, 252, 0.82);
      background: linear-gradient(180deg, rgba(99, 102, 241, 0.4), rgba(79, 70, 229, 0.2));
      box-shadow: 0 0 0 1px rgba(165, 180, 252, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .icon-btn--danger {
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.22);
      background: rgba(239, 68, 68, 0.12);
    }

    .icon-btn svg, .entry-delete svg { width: 18px; height: 18px; }

    .header-search {
      width: min(100%, 440px);
      position: relative;
    }

    .header-search input {
      padding-left: 40px;
      background: var(--surface);
    }

    .header-search svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-faint);
      pointer-events: none;
    }

    .filter-wrap {
      border-bottom: 1px solid var(--border);
      background: rgba(26, 29, 46, 0.96);
      overflow: hidden;
      transition: max-height 0.18s ease, opacity 0.18s ease;
    }

    .filter-wrap.is-open { max-height: 120px; opacity: 1; }
    .filter-wrap.is-closed { max-height: 0; opacity: 0; border-bottom-color: transparent; }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
    }

    .filter-label {
      flex: 0 0 auto;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 700;
    }

    .filter-btn {
      flex: 0 0 auto;
      padding: 0 12px;
      border-color: var(--border);
      background: var(--surface);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .manage-tags-btn { margin-left: auto; flex: 0 0 auto; }

    .app-main {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      overflow-x: hidden;
      min-height: 0;
      background: linear-gradient(180deg, rgba(30, 34, 53, 0.42), transparent 260px);
    }

    .bottom-bar {
      position: sticky;
      bottom: 0;
      z-index: 30;
      height: var(--bottom-h);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      border-top: 1px solid var(--border);
      background: rgba(15, 17, 23, 0.96);
      backdrop-filter: blur(12px);
      overflow-x: auto;
      white-space: nowrap;
    }

    .year-strip {
      display: flex;
      gap: 6px;
      min-width: 0;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
    }

    .year-strip::-webkit-scrollbar,
    .filter-bar::-webkit-scrollbar,
    .bottom-bar::-webkit-scrollbar { display: none; }

    .year-btn, .today-btn {
      flex: 0 0 auto;
      padding: 0 12px;
      border-color: var(--border);
      background: var(--surface);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .today-btn { margin-left: auto; }
    .today-btn svg { width: 16px; height: 16px; }

    .panel-empty,
    .panel-loading,
    .search-help {
      padding: 20px 14px 24px;
      color: var(--text-muted);
    }

    .panel-empty strong,
    .search-help strong { color: var(--text); }

    .calendar-wrap, .list-wrap, .search-wrap { min-height: 100%; }
    .calendar-grid { width: 100%; }

    .month-row {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(15, 17, 23, 0.98), rgba(15, 17, 23, 0.92));
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .day-row {
      display: grid;
      grid-template-columns: var(--date-col) minmax(0, 1fr);
      min-width: 0;
      border-bottom: 1px solid rgba(45, 49, 72, 0.9);
      content-visibility: auto;
      contain-intrinsic-size: 56px;
      background: transparent;
    }

    .day-row.is-today {
      box-shadow: inset 3px 0 0 var(--accent);
      background: rgba(99, 102, 241, 0.05);
    }

    .day-date {
      width: var(--date-col);
      min-width: var(--date-col);
      padding: 4px 6px 4px 10px;
      border-right: 1px solid rgba(45, 49, 72, 0.85);
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .day-date .weekday {
      display: block;
      margin-bottom: 1px;
      font-weight: 700;
      font-size: 12px;
    }

    .day-date .full-date {
      display: block;
      font-size: 12px;
      word-break: break-word;
    }

    .day-row.is-today .day-date,
    .day-row.is-today .day-date .weekday,
    .day-row.is-today .day-date .full-date {
      color: #c7d2fe;
      font-weight: 700;
    }

    .day-date.is-weekend { color: #6e8198; }

    .day-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 4px;
      align-items: start;
      min-width: 0;
      padding: 2px 6px;
    }

    .day-entries {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .empty-day {
      min-height: 28px;
      padding: 5px 8px;
      border: 1px dashed rgba(71, 85, 105, 0.4);
      border-radius: var(--radius-md);
      color: var(--text-faint);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      background: rgba(26, 29, 46, 0.35);
    }

    .entry-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 2px;
      align-items: center;
      min-width: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .entry-main {
      min-width: 0;
      min-height: 28px;
      padding: 3px 4px;
      display: flex;
      text-align: left;
      border: 0;
      background: transparent;
      color: var(--text);
    }

    .entry-text {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 0;
      min-width: 0;
    }

    .calendar-wrap .entry-main {
      align-items: center;
      gap: 6px;
      width: 100%;
    }

    .calendar-wrap .entry-meta {
      flex: 0 1 auto;
      flex-wrap: nowrap;
      overflow: hidden;
      max-width: 48%;
    }

    .calendar-wrap .tag-chip {
      flex: 0 0 auto;
      min-height: 16px;
      padding: 0 4px;
      font-size: 12px;
      line-height: 1.1;
    }

    .calendar-wrap .entry-text {
      flex: 1 1 auto;
      min-width: 0;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      -webkit-line-clamp: unset;
      line-height: 1.2;
    }

    .calendar-wrap .entry-item + .entry-item {
      border-top: 1px dotted rgba(71, 85, 105, 0.32);
      padding-top: 1px;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 16px;
      padding: 0 5px;
      border-radius: var(--radius-full);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry-delete {
      width: 44px;
      height: 44px;
      min-width: 44px;
      border-radius: 12px;
      border: 0;
      background: transparent;
      color: #fda4af;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      margin: 0;
    }

    .add-entry-btn { align-self: flex-start; }

    .calendar-wrap .add-entry-btn,
    .calendar-wrap .entry-delete {
      min-height: 36px;
      min-width: 36px;
      border-radius: 10px;
    }

    .calendar-wrap .empty-day {
      font-size: 12px;
      line-height: 1.2;
    }
    .list-wrap, .search-results { display: flex; flex-direction: column; }

    .list-row, .search-row {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      border-bottom: 1px solid rgba(45, 49, 72, 0.9);
      content-visibility: auto;
      contain-intrinsic-size: 88px;
      min-width: 0;
    }

    .list-date, .search-date {
      padding: 12px 8px 12px 12px;
      border-right: 1px solid rgba(45, 49, 72, 0.85);
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .list-date strong, .search-date strong {
      display: block;
      color: var(--text);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .list-main, .search-main {
      min-width: 0;
      padding: 10px 12px;
      display: block;
      text-align: left;
      background: transparent;
      border: 0;
      color: inherit;
    }

    .list-main:hover, .search-main:hover, .entry-main:hover {
      background: rgba(99, 102, 241, 0.04);
      border-radius: 12px;
    }

    .list-sub {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .list-created {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-faint);
    }

    .search-main mark {
      background: rgba(99, 102, 241, 0.28);
      color: var(--text);
      border-radius: 4px;
      padding: 0 2px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      padding: 12px;
    }

    .modal-card {
      width: min(680px, 100%);
      max-height: min(84dvh, 760px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(30, 34, 53, 1), rgba(26, 29, 46, 1));
      box-shadow: var(--shadow);
    }

    .modal-head, .modal-foot {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(45, 49, 72, 0.95);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-foot {
      border-top: 1px solid rgba(45, 49, 72, 0.95);
      border-bottom: 0;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .modal-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .modal-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .field-hint {
      font-size: 12px;
      color: var(--text-faint);
    }

    .modal-error, .auth-error, .setup-note {
      border: 1px solid rgba(239, 68, 68, 0.24);
      background: rgba(239, 68, 68, 0.12);
      color: #fecaca;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
    }

    .setup-note {
      border-color: rgba(99, 102, 241, 0.24);
      background: rgba(99, 102, 241, 0.12);
      color: #c7d2fe;
      text-align: left;
    }

    .tag-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-pill {
      padding: 0 12px;
      border-color: var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 700;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0 14px;
      border-color: var(--border);
      background: var(--surface);
      color: var(--text);
      font-weight: 700;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn:hover:not(.btn-primary) { background: var(--surface-2); }

    .btn-danger {
      background: rgba(239, 68, 68, 0.14);
      border-color: rgba(239, 68, 68, 0.24);
      color: #fecaca;
    }

    .color-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .color-dot {
      width: 36px;
      height: 36px;
      min-width: 36px;
      min-height: 36px;
      border-radius: 999px;
      border: 2px solid transparent;
      padding: 0;
      position: relative;
    }

    .color-dot.is-active {
      border-color: white;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .tags-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tag-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid rgba(45, 49, 72, 0.95);
      border-radius: 14px;
      background: rgba(26, 29, 46, 0.68);
    }

    .tag-row-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .tag-swatch {
      width: 14px;
      height: 14px;
      min-width: 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .tag-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .tag-meta {
      font-size: 12px;
      color: var(--text-faint);
    }

    .login-shell {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .login-card {
      width: min(420px, 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px;
      background: linear-gradient(180deg, rgba(30, 34, 53, 0.96), rgba(26, 29, 46, 0.96));
      box-shadow: var(--shadow);
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .logo-mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(99, 102, 241, 0.22), rgba(99, 102, 241, 0.08));
      border: 1px solid rgba(99, 102, 241, 0.22);
      color: white;
      flex: 0 0 auto;
    }

          rgba(45, 49, 72, 0.8) 80%);
      background-size: 220% 100%;
      animation: shimmer 1.4s linear infinite;
    }

    @keyframes shimmer {
      from { background-position: 220% 0; }
      to { background-position: -220% 0; }

    @media (hover: hover) and (pointer: fine) {
      .entry-delete { opacity: 0; }
      .entry-item:hover .entry-delete,
      .entry-delete:focus-visible { opacity: 1; }
    }

    @media (min-width: 768px) {
      .modal-overlay {
        align-items: center;
        padding: 24px;
      }
      .modal-card { border-radius: 24px; }
    }

    @media (max-width: 520px) {
      .app-header {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .header-center {
        grid-column: 1 / -1;
        order: 3;
        padding-bottom: 8px;
      }

      .app-header.has-search {
        height: auto;
        min-height: var(--header-h);

        justify-content: space-between;

        flex: 1 1 0;

      }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Zum Inhalt springen</a>
  <div id="root"></div>
  <div id="modal-root"></div>
  <div id="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script>
    const SUPABASE_URL = 'https://vbxtdeedozcvhcamhipz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieHRkZWVkb3pjdmhjYW1oaXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTIyNTAsImV4cCI6MjA4ODkyODI1MH0.Ners2V_WXlt2sTh8UtKC6bk7ZcZn2LgfUzbFExpz9ik';
    const HAS_SUPABASE_CONFIG = !SUPABASE_URL.startsWith('[') && !SUPABASE_ANON_KEY.startsWith('[');
    const { createClient } = supabase;

    const cookieStorage = {
      getItem(key) {
        const match = document.cookie.match(new RegExp('(?:^|; )' + encodeURIComponent(key) + '=([^;]*)'));
        return match ? decodeURIComponent(match[1]) : null;
      },
      setItem(key, value) {
        const maxAge = 60 * 60 * 24 * 30;
        const secure = location.protocol === 'https:' ? '; Secure' : '';
        document.cookie = encodeURIComponent(key) + '=' + encodeURIComponent(value) + '; path=/; max-age=' + maxAge + '; SameSite=Lax' + secure;
      },
      removeItem(key) {
        const secure = location.protocol === 'https:' ? '; Secure' : '';
        document.cookie = encodeURIComponent(key) + '=; path=/; max-age=0; SameSite=Lax' + secure;
      }
    };

    const db = HAS_SUPABASE_CONFIG ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        storage: cookieStorage,
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    }) : null;

    const WEEKDAYS = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];
    const MONTHS = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
    const TAG_COLORS = ['#6366f1', '#8b5cf6', '#ec4899', '#ef4444', '#f97316', '#f59e0b', '#84cc16', '#10b981', '#14b8a6', '#06b6d4'];

    const refs = {
      root: document.getElementById('root'),
      modalRoot: document.getElementById('modal-root'),
      toastRoot: document.getElementById('toast-root'),
      header: null,
      filterWrap: null,
      main: null,
      bottom: null
    };

    const state = {
      session: null,
      initialized: false,
      loading: false,
      view: 'calendar',
      selectedYear: new Date().getFullYear(),
      showFilters: true,
      activeFilters: new Set(),
      entries: [],
      tags: [],
      modal: null,
      searchQuery: '',
      searchDebounced: '',
      searchTimer: null,
      channel: null,
      toastTimer: null,
      suppressRemoteUntil: 0,
      pendingScrollDate: null,
      scrollPositions: {
        calendar: 0,
        list: 0,
        search: 0
      },
      searchInputFocused: false
    };

    function safeIcons() {
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
    }

    function brandSVG() {
      return `
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="16" rx="4"></rect>
          <path d="M16 3v4M8 3v4M3 10h18"></path>
          <path d="M8 14h3M13 14h3M8 18h3"></path>
        </svg>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function toRgb(hex) {
      const safe = String(hex || '#6366f1').replace('#', '');
      const normalized = safe.length === 3 ? safe.split('').map(x => x + x).join('') : safe;
      const int = parseInt(normalized, 16);
      return {
        r: (int >> 16) & 255,
        g: (int >> 8) & 255,
        b: int & 255
      };
    }

    function tagChipStyle(color) {
      const { r, g, b } = toRgb(color || '#6366f1');
      return `background: rgba(${r}, ${g}, ${b}, 0.16); border-color: rgba(${r}, ${g}, ${b}, 0.28); color: rgb(${Math.min(255, r + 90)}, ${Math.min(255, g + 90)}, ${Math.min(255, b + 90)});`;
    }

    function parseDate(dateStr) {
      const [y, m, d] = String(dateStr).split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function todayString() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    }

    function formatDateLabel(dateStr) {
      const dt = parseDate(dateStr);
      return `${WEEKDAYS[dt.getDay()]}, ${dt.getDate()}.${dt.getMonth() + 1}.${dt.getFullYear()}`;
    }

    function formatCreatedAt(value) {
      if (!value) return '';
      const dt = new Date(value);
      return dt.toLocaleString('de-DE', {
        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    function getTagById(tagId) {
      return state.tags.find(tag => String(tag.id) === String(tagId)) || null;
    }

    function renderTagChipById(tagId) {
      const tag = getTagById(tagId);
      if (!tag) return '';
      return `<span class="tag-chip" style="${tagChipStyle(tag.color)}">${escapeHtml(tag.name)}</span>`;
    }

    function entryMatchesFilters(entry) {
      if (!state.activeFilters.size) return true;
      const current = (entry.tags || []).map(String);
      return current.some(tagId => state.activeFilters.has(String(tagId)));
    }

    function getFilteredEntries() {
      return state.entries.filter(entryMatchesFilters);
    }

    function sortedListEntries() {
      return [...getFilteredEntries()].sort((a, b) => {
        const createdDiff = new Date(b.created_at || 0) - new Date(a.created_at || 0);
        if (createdDiff !== 0) return createdDiff;
        return String(b.id).localeCompare(String(a.id));
      });
    }

    function sortedSearchEntries(query) {
      const q = String(query || '').trim().toLowerCase();
      if (!q) return [];
      return getFilteredEntries()
        .filter(entry => String(entry.text || '').toLowerCase().includes(q))
        .sort((a, b) => {
          const dateDiff = parseDate(b.date) - parseDate(a.date);
          if (dateDiff !== 0) return dateDiff;
          return new Date(b.created_at || 0) - new Date(a.created_at || 0);
        });
    }

    function excerptWithHighlight(text, query) {
      const source = String(text || '');
      const q = String(query || '').trim();
      if (!q) return escapeHtml(source.slice(0, 180));
      const lower = source.toLowerCase();
      const index = lower.indexOf(q.toLowerCase());
      if (index === -1) return escapeHtml(source.slice(0, 180));
      const start = index > 40 ? index - 40 : 0;
      const end = Math.min(source.length, index + q.length + 80);
      const prefix = start > 0 ? '…' : '';
      const suffix = end < source.length ? '…' : '';
      const snippet = source.slice(start, end);
      const regex = new RegExp(escapeRegExp(q), 'ig');
      return prefix + escapeHtml(snippet).replace(regex, match => `<mark>${escapeHtml(match)}</mark>`) + suffix;
    }

    function showToast(message, type = 'success') {
      clearTimeout(state.toastTimer);
      refs.toastRoot.innerHTML = `
        <div class="toast ${type === 'error' ? 'toast--error' : ''}">
          <span class="toast-icon"><i data-lucide="${type === 'error' ? 'circle-alert' : 'check'}"></i></span>
          <span>${escapeHtml(message)}</span>
        </div>
      `;
      safeIcons();
      state.toastTimer = setTimeout(() => {
        refs.toastRoot.innerHTML = '';
      }, 2600);
    }

    function authErrorMessage(message) {
      if (!message) return 'Anmeldung fehlgeschlagen.';
      if (/invalid login credentials/i.test(message)) return 'E-Mail oder Passwort ist falsch.';
      if (/email not confirmed/i.test(message)) return 'Bitte bestätige zuerst deine E-Mail-Adresse.';
      return message;
    }

    function renderSetupScreen() {
      refs.root.innerHTML = `
        <div class="login-shell">
          <section class="login-card" aria-labelledby="setup-title">
            <div class="login-brand">
              <div class="logo-mark" aria-hidden="true">${brandSVG()}</div>
              <div>
                <div id="setup-title" class="login-title">Kalender</div>
                <div class="login-copy">Supabase-Konfiguration fehlt noch.</div>
              </div>
            </div>
            <div class="setup-note">
              Trage oben im Script <strong>SUPABASE_URL</strong> und <strong>SUPABASE_ANON_KEY</strong> ein und deploye danach erneut.
            </div>
          </section>
        </div>
      `;
      safeIcons();
    }

    function renderLogin(error = '', submitting = false) {
      refs.root.innerHTML = `
        <div class="login-shell">
          <section class="login-card" aria-labelledby="login-title">
            <div class="login-brand">
              <div class="logo-mark" aria-hidden="true">${brandSVG()}</div>
              <div>
                <div id="login-title" class="login-title">Kalender</div>
                <div class="login-copy">Mit E-Mail und Passwort anmelden.</div>
              </div>
            </div>
            <form id="login-form" class="login-form" novalidate>
              <div class="field">
                <label class="label" for="login-email">E-Mail</label>
                <input id="login-email" name="email" type="email" autocomplete="email" required placeholder="name@example.com" />
              </div>
              <div class="field">
                <label class="label" for="login-password">Passwort</label>
                <input id="login-password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••" />
              </div>
              ${error ? `<div class="auth-error" role="alert">${escapeHtml(error)}</div>` : ''}
              <div class="helper-row">
                <span class="helper-text">Aktive Session wird automatisch wiederverwendet.</span>
              </div>
              <button class="btn btn-primary" type="submit" ${submitting ? 'disabled' : ''}>${submitting ? 'Anmeldung…' : 'Anmelden'}</button>
            </form>
          </section>
        </div>
      `;
      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('login-email');
      emailInput?.focus();
      form?.addEventListener('submit', async (event) => {
        event.preventDefault();
        const email = form.email.value.trim();
        const password = form.password.value;
        renderLogin('', true);
        try {
          const { error: signInError } = await db.auth.signInWithPassword({ email, password });
          if (signInError) throw signInError;
        } catch (err) {
          renderLogin(authErrorMessage(err?.message || ''));
        }
      });
      safeIcons();
    }

    function renderAppShell() {
      refs.root.innerHTML = `
        <div class="app-shell">
          <header id="app-header" class="app-header"></header>
          <div id="filter-wrap" class="filter-wrap"></div>
          <main id="main-content" class="app-main" tabindex="-1"></main>
          <nav id="bottom-bar" class="bottom-bar" aria-label="Jahresnavigation"></nav>
        </div>
      `;
      refs.header = document.getElementById('app-header');
      refs.filterWrap = document.getElementById('filter-wrap');
      refs.main = document.getElementById('main-content');
      refs.bottom = document.getElementById('bottom-bar');
      refs.main.addEventListener('scroll', () => {
        state.scrollPositions[state.view] = refs.main.scrollTop;
      }, { passive: true });
      safeIcons();
    }

    function renderHeader() {
      refs.header.className = `app-header ${state.view === 'search' ? 'has-search' : ''}`;
      refs.header.innerHTML = `
        <div class="header-left">
          <button class="brand" type="button" aria-label="Heute anzeigen" data-action="go-today-brand">${brandSVG()}</button>
          <div class="view-tabs" role="tablist" aria-label="Ansichten">
            <button class="tab-btn ${state.view === 'calendar' ? 'is-active' : ''}" type="button" role="tab" aria-selected="${state.view === 'calendar'}" data-view="calendar">Kalender</button>
            <button class="tab-btn ${state.view === 'list' ? 'is-active' : ''}" type="button" role="tab" aria-selected="${state.view === 'list'}" data-view="list">Liste</button>
            <button class="tab-btn ${state.view === 'search' ? 'is-active' : ''}" type="button" role="tab" aria-selected="${state.view === 'search'}" data-view="search">Suche</button>
          </div>
        </div>
        <div class="header-center">
          ${state.view === 'search' ? `
            <div class="header-search">
              <i data-lucide="search"></i>
              <input id="search-input" type="search" inputmode="search" placeholder="Einträge durchsuchen" value="${escapeHtml(state.searchQuery)}" aria-label="Einträge durchsuchen" />
            </div>
          ` : ''}
        </div>
        <div class="header-right">
          <button class="icon-btn ${state.view === 'search' ? 'is-active' : ''}" type="button" data-action="switch-search" aria-label="Suche öffnen"><i data-lucide="search"></i></button>
          <button class="icon-btn ${state.showFilters ? 'is-active' : ''}" type="button" data-action="toggle-filters" aria-label="Tag-Filter ein- oder ausblenden"><i data-lucide="tags"></i></button>
          <button class="icon-btn" type="button" data-action="export-csv" aria-label="CSV exportieren"><i data-lucide="download"></i></button>
          <button class="icon-btn" type="button" data-action="logout" aria-label="Abmelden"><i data-lucide="log-out"></i></button>
        </div>
      `;

      refs.header.querySelectorAll('[data-view]').forEach(btn => {
        btn.addEventListener('click', () => switchView(btn.dataset.view));
      });

      refs.header.querySelector('[data-action="go-today-brand"]')?.addEventListener('click', goToToday);
      refs.header.querySelector('[data-action="switch-search"]')?.addEventListener('click', () => switchView('search'));
      refs.header.querySelector('[data-action="toggle-filters"]')?.addEventListener('click', () => {
        state.showFilters = !state.showFilters;
        renderHeader();
        renderFilterBar();
      });
      refs.header.querySelector('[data-action="export-csv"]')?.addEventListener('click', exportCsv);
      refs.header.querySelector('[data-action="logout"]')?.addEventListener('click', logout);

      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.addEventListener('input', (event) => {
          state.searchQuery = event.target.value;
          clearTimeout(state.searchTimer);
          state.searchTimer = setTimeout(() => {
            state.searchDebounced = state.searchQuery;
            renderMain(true);
          }, 300);
        });
        requestAnimationFrame(() => {
          if (state.view === 'search') searchInput.focus();
        });
      }
      safeIcons();
    }

    function renderFilterBar() {
      refs.filterWrap.className = `filter-wrap ${state.showFilters ? 'is-open' : 'is-closed'}`;
      refs.filterWrap.innerHTML = state.showFilters ? `
        <div class="filter-bar" aria-label="Tag-Filter">
          <span class="filter-label">Filter:</span>
          <button class="filter-btn filter-all ${state.activeFilters.size === 0 ? 'is-active' : ''}" type="button" data-filter="all">Alle</button>
          ${state.tags.map(tag => `
            <button class="filter-btn ${state.activeFilters.has(String(tag.id)) ? 'is-active' : ''}" type="button" data-filter="${escapeHtml(String(tag.id))}" style="${tagChipStyle(tag.color)}">${escapeHtml(tag.name)}</button>
          `).join('')}
          <button class="icon-btn manage-tags-btn" type="button" data-action="manage-tags" aria-label="Tags verwalten"><i data-lucide="settings-2"></i></button>
        </div>
      ` : '';

      refs.filterWrap.querySelector('[data-filter="all"]')?.addEventListener('click', () => {
        state.activeFilters = new Set();
        renderFilterBar();
        renderMain(false);
      });

      refs.filterWrap.querySelectorAll('[data-filter]').forEach(btn => {
        const value = btn.dataset.filter;
        if (value === 'all') return;
        btn.addEventListener('click', () => {
          const key = String(value);
          if (state.activeFilters.has(String(key))) state.activeFilters.delete(String(key));
          else state.activeFilters.add(String(key));
          renderFilterBar();
          renderMain(false);
        });
      });

      refs.filterWrap.querySelector('[data-action="manage-tags"]')?.addEventListener('click', openTagsModal);
      safeIcons();
    }

    function renderBottomBar() {
      const currentYear = new Date().getFullYear();
      const years = [currentYear - 1, currentYear, currentYear + 1, currentYear + 2];
      refs.bottom.innerHTML = `
        <div class="year-strip">
          ${years.map(year => `<button class="year-btn ${state.selectedYear === year ? 'is-active' : ''}" type="button" data-year="${year}">${year}</button>`).join('')}
        </div>
        <button class="today-btn btn" type="button" data-action="today"><i data-lucide="arrow-up"></i>&nbsp;Heute</button>
      `;
      refs.bottom.querySelectorAll('[data-year]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedYear = Number(btn.dataset.year);
          state.pendingScrollDate = null;
          renderBottomBar();
          renderMain(false, true);
        });
      });
      refs.bottom.querySelector('[data-action="today"]')?.addEventListener('click', goToToday);
      safeIcons();
    }

    function buildCalendarHTML() {
      const grouped = new Map();
      getFilteredEntries().forEach(entry => {
        if (!grouped.has(entry.date)) grouped.set(entry.date, []);
        grouped.get(entry.date).push(entry);
      });

      const year = state.selectedYear;
      const start = new Date(year, 0, 1);
      const end = new Date(year, 11, 31);
      const today = todayString();
      let current = new Date(start);
      let lastMonth = -1;
      let html = '<div class="calendar-wrap"><div class="calendar-grid" id="cal">';

      while (current <= end) {
        const dateStr = `${current.getFullYear()}-${String(current.getMonth() + 1).padStart(2, '0')}-${String(current.getDate()).padStart(2, '0')}`;
        if (current.getMonth() !== lastMonth) {
          lastMonth = current.getMonth();
          html += `<div class="month-row">${MONTHS[current.getMonth()]} ${current.getFullYear()}</div>`;
        }
        const weekend = current.getDay() === 0 || current.getDay() === 6;
        const dayEntries = grouped.get(dateStr) || [];
        html += `
          <section class="day-row ${dateStr === today ? 'is-today' : ''}" data-day-row="${dateStr}">
            <div class="day-date ${weekend ? 'is-weekend' : ''}">
              <span class="weekday">${WEEKDAYS[current.getDay()]}</span>
              <span class="full-date">${current.getDate()}.${current.getMonth() + 1}.${current.getFullYear()}</span>
            </div>
            <div class="day-body">
              <div class="day-entries">
                ${dayEntries.length ? dayEntries.map(entry => `
                  <article class="entry-item">
                    <button class="entry-main" type="button" data-action="edit-entry" data-entry-id="${escapeHtml(String(entry.id))}">
                      <div class="entry-text">${escapeHtml(entry.text)}</div>
                      ${(entry.tags || []).length ? `<div class="entry-meta">${(entry.tags || []).map(renderTagChipById).join('')}</div>` : ''}
                    </button>
                    <button class="entry-delete" type="button" data-action="delete-entry" data-entry-id="${escapeHtml(String(entry.id))}" aria-label="Eintrag löschen"><i data-lucide="trash-2"></i></button>
                  </article>
                `).join('') : `<div class="empty-day">Kein Eintrag</div>`}
              </div>
              <button class="icon-btn add-entry-btn" type="button" data-action="new-entry" data-date="${dateStr}" aria-label="Eintrag für ${formatDateLabel(dateStr)} anlegen"><i data-lucide="plus"></i></button>
            </div>
          </section>
        `;
        current.setDate(current.getDate() + 1);
      }

      html += '</div></div>';
      return html;
    }

    function buildListHTML() {
      const items = sortedListEntries();
      if (!items.length) {
        return `<div class="list-wrap"><div class="panel-empty"><strong>Keine Einträge gefunden.</strong><br />Passe die Tag-Filter an oder lege einen neuen Eintrag an.</div></div>`;
      }
      return `
        <div class="list-wrap">
          ${items.map(entry => `
            <article class="list-row">
              <div class="list-date">
                <strong>${WEEKDAYS[parseDate(entry.date).getDay()]}</strong>
                <span>${parseDate(entry.date).getDate()}.${parseDate(entry.date).getMonth() + 1}.${parseDate(entry.date).getFullYear()}</span>
              </div>
              <button class="list-main" type="button" data-action="edit-entry" data-entry-id="${escapeHtml(String(entry.id))}">
                <div class="entry-text">${escapeHtml(entry.text)}</div>
                ${(entry.tags || []).length ? `<div class="list-sub">${(entry.tags || []).map(renderTagChipById).join('')}</div>` : ''}
                <div class="list-created">Erstellt: ${escapeHtml(formatCreatedAt(entry.created_at))}</div>
              </button>
            </article>
          `).join('')}
        </div>
      `;
    }

    function buildSearchHTML() {
      const query = state.searchDebounced.trim();
      if (!query) {
        return `<div class="search-wrap"><div class="search-help"><strong>Suche aktiv.</strong><br />Tippe im Suchfeld oben, um Einträge sofort zu finden.</div></div>`;
      }
      const items = sortedSearchEntries(query);
      if (!items.length) {
        return `<div class="search-wrap"><div class="panel-empty"><strong>Keine Treffer.</strong><br />Für „${escapeHtml(query)}“ wurde nichts gefunden.</div></div>`;
      }
      return `
        <div class="search-wrap">
          <div class="search-results">
            ${items.map(entry => `
              <article class="search-row">
                <div class="search-date">
                  <strong>${WEEKDAYS[parseDate(entry.date).getDay()]}</strong>
                  <span>${parseDate(entry.date).getDate()}.${parseDate(entry.date).getMonth() + 1}.${parseDate(entry.date).getFullYear()}</span>
                </div>
                <button class="search-main" type="button" data-action="jump-to-date" data-date="${entry.date}">
                  <div>${excerptWithHighlight(entry.text, query)}</div>
                  ${(entry.tags || []).length ? `<div class="list-sub">${(entry.tags || []).map(renderTagChipById).join('')}</div>` : ''}
                </button>
              </article>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderMain(preserveScroll = true, forceTop = false) {
      if (!refs.main) return;
      const previous = refs.main.scrollTop;
      const remembered = preserveScroll ? previous : (state.scrollPositions[state.view] || 0);
      let html = '';
      if (state.loading) {
        html = `<div class="panel-loading"><div class="skeleton-list"><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div></div></div>`;
      } else if (state.view === 'calendar') {
        html = buildCalendarHTML();
      } else if (state.view === 'list') {
        html = buildListHTML();
      } else {
        html = buildSearchHTML();
      }
      refs.main.innerHTML = html;
      bindMainEvents();
      safeIcons();
      requestAnimationFrame(() => {
        if (state.pendingScrollDate) {
          scrollToDateRow(state.pendingScrollDate);
          state.pendingScrollDate = null;
          return;
        }
        refs.main.scrollTop = forceTop ? 0 : remembered;
      });
    }

    function bindMainEvents() {
      refs.main.querySelectorAll('[data-action="new-entry"]').forEach(btn => {
        btn.addEventListener('click', () => openEntryModal({ date: btn.dataset.date }));
      });
      refs.main.querySelectorAll('[data-action="edit-entry"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const entry = state.entries.find(item => String(item.id) === String(btn.dataset.entryId));
          if (entry) openEntryModal(entry);
        });
      });
      refs.main.querySelectorAll('[data-action="delete-entry"]').forEach(btn => {
        btn.addEventListener('click', async (event) => {
          event.stopPropagation();
          const entry = state.entries.find(item => String(item.id) === String(btn.dataset.entryId));
          if (entry) await deleteEntry(entry);
        });
      });
      refs.main.querySelectorAll('[data-action="jump-to-date"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const date = btn.dataset.date;
          state.selectedYear = parseDate(date).getFullYear();
          state.view = 'calendar';
          state.pendingScrollDate = date;
          renderHeader();
          renderBottomBar();
          renderMain(false, false);
        });
      });
    }

    function switchView(view) {
      if (view === state.view) return;
      if (refs.main) state.scrollPositions[state.view] = refs.main.scrollTop;
      state.view = view;
      renderHeader();
      renderMain(false, false);
    }

    function goToToday() {
      const today = todayString();
      state.selectedYear = parseDate(today).getFullYear();
      state.view = 'calendar';
      state.pendingScrollDate = today;
      renderHeader();
      renderBottomBar();
      renderMain(false, true);
    }

    function scrollToDateRow(dateStr) {
      const row = refs.main.querySelector(`[data-day-row="${CSS.escape(dateStr)}"]`);
      if (!row) {
        refs.main.scrollTop = 0;
        return;
      }

      const alignRow = () => {
        const mainRect = refs.main.getBoundingClientRect();
        const rowRect = row.getBoundingClientRect();
        const desiredTop = Math.max(20, Math.min(96, Math.round(refs.main.clientHeight * 0.28)));
        const delta = rowRect.top - mainRect.top - desiredTop;
        if (Math.abs(delta) > 1) refs.main.scrollTop += delta;
      };

      row.scrollIntoView({ block: 'start', inline: 'nearest', behavior: 'auto' });
      alignRow();
      requestAnimationFrame(() => {
        alignRow();
        setTimeout(alignRow, 80);
        setTimeout(alignRow, 220);
      });
    }

    function openEntryModal(entryOrDraft) {
      const isEdit = Boolean(entryOrDraft.id);
      state.modal = {
        type: 'entry',
        isEdit,
        id: entryOrDraft.id || null,
        date: entryOrDraft.date || todayString(),
        text: entryOrDraft.text || '',
        tags: new Set((entryOrDraft.tags || []).map(String)),
        error: '',
        saving: false
      };
      renderModal();
    }

    function openTagsModal() {
      state.modal = {
        type: 'tags',
        name: '',
        color: TAG_COLORS[0],
        error: '',
        saving: false,
        deleting: null
      };
      renderModal();
    }

    function closeModal() {
      state.modal = null;
      refs.modalRoot.innerHTML = '';
    }

    function renderModal() {
      const modal = state.modal;
      if (!modal) {
        refs.modalRoot.innerHTML = '';
        return;
      }

      if (modal.type === 'entry') {
        refs.modalRoot.innerHTML = `
          <div class="modal-overlay" id="modal-overlay">
            <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="entry-modal-title">
              <div class="modal-head">
                <div>
                  <div id="entry-modal-title" class="modal-title">${modal.isEdit ? 'Eintrag bearbeiten' : 'Neuer Eintrag'}: ${escapeHtml(formatDateLabel(modal.date))}</div>
                  <div class="modal-subtitle">Text und Tags verwalten.</div>
                </div>
                <button class="icon-btn" type="button" data-action="close-modal" aria-label="Modal schließen"><i data-lucide="x"></i></button>
              </div>
              <form id="entry-form">
                <div class="modal-body">
                  ${modal.error ? `<div class="modal-error" role="alert">${escapeHtml(modal.error)}</div>` : ''}
                  <div class="field">
                    <label class="label" for="entry-textarea">Eintrag</label>
                    <textarea id="entry-textarea" name="text" rows="3" placeholder="Notiz für diesen Tag">${escapeHtml(modal.text)}</textarea>
                  </div>
                  <div class="field">
                    <div class="label">Tags</div>
                    <div class="tag-picker">
                      ${state.tags.length ? state.tags.map(tag => `
                        <button class="tag-pill ${modal.tags.has(String(tag.id)) ? 'is-active' : ''}" type="button" data-action="toggle-modal-tag" data-tag-id="${escapeHtml(String(tag.id))}" style="${tagChipStyle(tag.color)}">${escapeHtml(tag.name)}</button>
                      `).join('') : '<div class="field-hint">Noch keine Tags vorhanden.</div>'}
                    </div>
                  </div>
                </div>
                <div class="modal-foot">
                  <div class="modal-actions">
                    <button class="btn" type="button" data-action="close-modal">Abbrechen</button>
                    <button class="btn btn-primary" type="submit">${modal.saving ? 'Speichern…' : 'Speichern'}</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        `;
      }

      if (modal.type === 'tags') {
        refs.modalRoot.innerHTML = `
          <div class="modal-overlay" id="modal-overlay">
            <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="tags-modal-title">
              <div class="modal-head">
                <div>
                  <div id="tags-modal-title" class="modal-title">Tags verwalten</div>
                  <div class="modal-subtitle">Neue Tags anlegen, bestehende Tags löschen.</div>
                </div>
                <button class="icon-btn" type="button" data-action="close-modal" aria-label="Modal schließen"><i data-lucide="x"></i></button>
              </div>
              <form id="tags-form">
                <div class="modal-body">
                  ${modal.error ? `<div class="modal-error" role="alert">${escapeHtml(modal.error)}</div>` : ''}
                  <div class="field">
                    <label class="label" for="tag-name">Name</label>
                    <input id="tag-name" name="name" maxlength="30" placeholder="z. B. Urlaub" value="${escapeHtml(modal.name)}" />
                    <div class="field-hint">Maximal 30 Zeichen.</div>
                  </div>
                  <div class="field">
                    <div class="label">Farbe</div>
                    <div class="color-grid">
                      ${TAG_COLORS.map(color => `
                        <button class="color-dot ${modal.color === color ? 'is-active' : ''}" type="button" data-action="pick-color" data-color="${color}" style="background:${color}" aria-label="Farbe ${color}"></button>
                      `).join('')}
                    </div>
                  </div>
                  <div class="field">
                    <div class="label">Vorhandene Tags</div>
                    <div class="tags-list">
                      ${state.tags.length ? state.tags.map(tag => `
                        <div class="tag-row">
                          <div class="tag-row-main">
                            <span class="tag-swatch" style="background:${tag.color}"></span>
                            <div>
                              <div class="tag-name">${escapeHtml(tag.name)}</div>
                              <div class="tag-meta">${escapeHtml(tag.color)}</div>
                            </div>
                          </div>
                          <button class="icon-btn icon-btn--danger" type="button" data-action="delete-tag" data-tag-id="${escapeHtml(String(tag.id))}" aria-label="Tag löschen"><i data-lucide="trash-2"></i></button>
                        </div>
                      `).join('') : '<div class="field-hint">Noch keine Tags vorhanden.</div>'}
                    </div>
                  </div>
                </div>
                <div class="modal-foot">
                  <div class="modal-actions">
                    <button class="btn" type="button" data-action="close-modal">Schließen</button>
                    <button class="btn btn-primary" type="submit">${modal.saving ? 'Speichern…' : 'Tag anlegen'}</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        `;
      }

      bindModalEvents();
      safeIcons();
      const overlay = document.getElementById('modal-overlay');
      overlay?.addEventListener('click', e => {
        if (e.target === overlay) closeModal();
      });
      requestAnimationFrame(() => {
        const focusEl = modal.type === 'entry' ? document.getElementById('entry-textarea') : document.getElementById('tag-name');
        focusEl?.focus();
      });
    }

    function bindModalEvents() {
      refs.modalRoot.querySelectorAll('[data-action="close-modal"]').forEach(btn => {
        btn.addEventListener('click', closeModal);
      });

      refs.modalRoot.querySelectorAll('[data-action="toggle-modal-tag"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const textarea = document.getElementById('entry-textarea');
          if (textarea && state.modal?.type === 'entry') state.modal.text = textarea.value;
          const tagId = String(btn.dataset.tagId);
          if (state.modal.tags.has(String(tagId))) state.modal.tags.delete(String(tagId));
          else state.modal.tags.add(String(tagId));
          renderModal();
        });
      });

      refs.modalRoot.querySelectorAll('[data-action="pick-color"]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.modal.color = btn.dataset.color;
          renderModal();
        });
      });

      refs.modalRoot.querySelectorAll('[data-action="delete-tag"]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const tagId = btn.dataset.tagId;
          const tag = state.tags.find(item => String(item.id) === String(tagId));
          if (tag) await deleteTag(tag);
        });
      });

      const entryTextarea = document.getElementById('entry-textarea');
      entryTextarea?.addEventListener('input', () => {
        if (state.modal?.type === 'entry') state.modal.text = entryTextarea.value;
      });

      document.getElementById('entry-form')?.addEventListener('submit', async (event) => {
        event.preventDefault();
        const textarea = document.getElementById('entry-textarea');
        state.modal.text = textarea.value;
        await saveEntryFromModal();
      });

      document.getElementById('tags-form')?.addEventListener('submit', async (event) => {
        event.preventDefault();
        const nameInput = document.getElementById('tag-name');
        state.modal.name = nameInput.value;
        await createTagFromModal();
      });
    }

    async function saveEntryFromModal() {
      const modal = state.modal;
      const text = String(modal.text || '').trim();
      if (!text) {
        modal.error = 'Bitte Text eingeben.';
        renderModal();
        return;
      }
      modal.error = '';
      modal.saving = true;
      renderModal();
      const payload = {
        date: modal.date,
        text,
        tags: Array.from(modal.tags),
        updated_at: new Date().toISOString()
      };
      try {
        state.suppressRemoteUntil = Date.now() + 2500;
        if (modal.isEdit && modal.id) {
          const { error } = await db.from('entries').update(payload).eq('id', modal.id);
          if (error) throw error;
          showToast('Eintrag gespeichert');
        } else {
          payload.created_by = state.session?.user?.id || null;
          const { error } = await db.from('entries').insert(payload);
          if (error) throw error;
          showToast('Eintrag angelegt');
        }
        closeModal();
        await loadData(false);
      } catch (err) {
        state.modal = { ...modal, saving: false, error: err?.message || 'Speichern fehlgeschlagen.' };
        renderModal();
      }
    }

    async function deleteEntry(entry) {
      const confirmed = window.confirm(`Eintrag vom ${formatDateLabel(entry.date)} löschen?`);
      if (!confirmed) return;
      try {
        state.suppressRemoteUntil = Date.now() + 2500;
        const { error } = await db.from('entries').delete().eq('id', entry.id);
        if (error) throw error;
        showToast('Eintrag gelöscht');
        await loadData(false);
      } catch (err) {
        showToast(err?.message || 'Löschen fehlgeschlagen.', 'error');
      }
    }

    async function createTagFromModal() {
      const modal = state.modal;
      const name = String(modal.name || '').trim();
      if (!name) {
        modal.error = 'Bitte einen Tag-Namen eingeben.';
        renderModal();
        return;
      }
      if (name.length > 30) {
        modal.error = 'Der Tag-Name darf maximal 30 Zeichen haben.';
        renderModal();
        return;
      }
      modal.error = '';
      modal.saving = true;
      renderModal();
      try {
        state.suppressRemoteUntil = Date.now() + 2500;
        const payload = {
          name,
          color: modal.color,
          sort_order: state.tags.length
        };
        const { error } = await db.from('tags').insert(payload);
        if (error) throw error;
        showToast('Tag angelegt');
        state.modal = { ...modal, name: '', saving: false };
        await loadData(false);
        openTagsModal();
      } catch (err) {
        state.modal = { ...modal, saving: false, error: err?.message || 'Tag konnte nicht angelegt werden.' };
        renderModal();
      }
    }

    async function deleteTag(tag) {
      const confirmed = window.confirm(`Tag „${tag.name}“ löschen? Er wird aus allen Einträgen entfernt.`);
      if (!confirmed) return;
      try {
        state.suppressRemoteUntil = Date.now() + 2500;
        const affected = state.entries.filter(entry => (entry.tags || []).map(String).includes(String(tag.id)));
        for (const entry of affected) {
          const nextTags = (entry.tags || []).map(String).filter(id => String(id) !== String(tag.id));
          const { error: updateError } = await db.from('entries').update({ tags: nextTags, updated_at: new Date().toISOString() }).eq('id', entry.id);
          if (updateError) throw updateError;
        }
        const { error } = await db.from('tags').delete().eq('id', tag.id);
        if (error) throw error;
        state.activeFilters.delete(String(tag.id));
        showToast('Tag gelöscht');
        await loadData(false);
        openTagsModal();
      } catch (err) {
        state.modal = { ...state.modal, error: err?.message || 'Tag konnte nicht gelöscht werden.' };
        renderModal();
      }
    }

    async function exportCsv() {
      const rows = [...state.entries]
        .sort((a, b) => parseDate(a.date) - parseDate(b.date) || new Date(a.created_at || 0) - new Date(b.created_at || 0))
        .map(entry => ({
          date: entry.date,
          text: String(entry.text || '').replace(/\r?\n/g, ' '),
          tags: (entry.tags || []).map(tagId => getTagById(tagId)?.name).filter(Boolean).join(', '),
          created_at: formatCreatedAt(entry.created_at)
        }));
      const header = ['Datum', 'Text', 'Tags', 'Erstellt am'];
      const csv = [header, ...rows.map(row => [row.date, row.text, row.tags, row.created_at])]
        .map(cols => cols.map(value => `"${String(value ?? '').replace(/"/g, '""')}"`).join(';'))
        .join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `kalender-export-${todayString()}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('CSV exportiert');
    }

    async function logout() {
      try {
        await db.auth.signOut();
      } catch (err) {
        showToast(err?.message || 'Abmelden fehlgeschlagen.', 'error');
      }
    }

    async function loadData(showLoader = true) {
      state.loading = showLoader;
      renderMain(false, false);
      const [entriesRes, tagsRes] = await Promise.all([
        db.from('entries').select('*').order('date', { ascending: true }).order('created_at', { ascending: true }),
        db.from('tags').select('*').order('sort_order', { ascending: true }).order('name', { ascending: true })
      ]);

      if (entriesRes.error) throw entriesRes.error;
      if (tagsRes.error) throw tagsRes.error;

      state.entries = entriesRes.data || [];
      state.tags = tagsRes.data || [];
      state.loading = false;
      renderFilterBar();
      renderMain(false, false);
    }

    function subscribeRealtime() {
      if (state.channel) return;
      state.channel = db
        .channel('app')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'entries' }, async () => {
          if (Date.now() < state.suppressRemoteUntil) return;
          try {
            await loadData(false);
            showToast('✓ Aktualisiert');
          } catch (err) {
            showToast(err?.message || 'Aktualisierung fehlgeschlagen.', 'error');
          }
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'tags' }, async () => {
          if (Date.now() < state.suppressRemoteUntil) return;
          try {
            await loadData(false);
            showToast('✓ Aktualisiert');
          } catch (err) {
            showToast(err?.message || 'Aktualisierung fehlgeschlagen.', 'error');
          }
        })
        .subscribe();
    }

    function cleanupRealtime() {
      if (!state.channel) return;
      db.removeChannel(state.channel);
      state.channel = null;
    }

    async function initApp() {
      renderAppShell();
      renderHeader();
      renderFilterBar();
      renderBottomBar();
      renderMain(false, true);
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && state.modal) closeModal();
      }, { passive: true });
      try {
        await loadData(true);
        subscribeRealtime();
      } catch (err) {
        showToast(err?.message || 'Daten konnten nicht geladen werden.', 'error');
      }
    }

    async function boot() {
      if (!HAS_SUPABASE_CONFIG) {
        renderSetupScreen();
        return;
      }

      let initialized = false;

      db.auth.onAuthStateChange((_event, session) => {
        state.session = session;
        if (session && !initialized) {
          initialized = true;
          state.initialized = true;
          initApp();
        }
        if (!session) {
          initialized = false;
          state.initialized = false;
          cleanupRealtime();
          closeModal();
          renderLogin();
        }
      });

      try {
        const { data, error } = await db.auth.getSession();
        if (error) throw error;
        state.session = data.session;
        if (data.session && !initialized) {
          initialized = true;
          state.initialized = true;
          await initApp();
        } else if (!data.session) {
          renderLogin();
        }
      } catch (err) {
        renderLogin(authErrorMessage(err?.message || 'Session konnte nicht geprüft werden.'));
      }
    }

    window.addEventListener('error', (event) => {
      const message = event?.error?.message || event?.message || 'Unbekannter Fehler';
      if (refs.toastRoot) showToast(message, 'error');
    });

    boot();
  </script>
</body>
</html>
